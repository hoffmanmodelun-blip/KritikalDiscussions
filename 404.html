<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecting — Kritikal Discussions</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/png" sizes="48x48" href="/Site%20Assets/favicon-48.png">
<script>
  const routes = {
    'resources': 'resources',
    'starter-guide': 'starter-guide',
    'guide': 'guide',
    'resources/starter-guide': 'starter-guide',
    'guide-argumentation': 'guide-argumentation',
    'basic-argumentation': 'basic-argumentation',
    'a-guide-to-basic-argumentation': 'a-guide-to-basic-argumentation',
    'argumentation-guide': 'guide-argumentation',
    'resources/basic-argumentation': 'basic-argumentation',
    'camp': 'camp',
    'debate-camp': 'camp',
    'summer-camp': 'camp-2026',
    'summer-debate-camp': 'camp-2026',
    '2026-debate-camp': 'camp-2026',
    '2026-debate-summer-camp': 'camp-2026',
    '2026-summer-camp': 'camp-2026',
    'debate-camp/2026': 'camp-2026',
    '2025-debate-camp': 'camp-2025',
    '2025-debate-summer-camp': 'camp-2025',
    '2025-summer-camp': 'camp-2025',
    'debate-camp/2025': 'camp-2025',
    'team': 'team',
    'our-team': 'team',
    'founders': 'team',
    'contact': 'contact',
    'contact-us': 'contact'
  };

  function normalizePath(path){
    try { path = decodeURIComponent(path); } catch (e) {}
    return path
      .replace(/^\/+|\/+$/g, '')
      .toLowerCase()
      .replace(/\.(html?|php|aspx?)$/g, '')
      .replace(/[^a-z0-9/]+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
  }

  function inferRoute(path){
    if (routes[path]) return routes[path];
    const flat = path.replace(/\//g, '-');
    if (flat.includes('2025') && flat.includes('camp')) return 'camp-2025';
    if (flat.includes('2026') && flat.includes('camp')) return 'camp-2026';
    if (flat.includes('starter') && flat.includes('guide')) return 'starter-guide';
    if (flat.includes('argumentation') || (flat.includes('basic') && flat.includes('argument'))) return 'guide-argumentation';
    if (flat.includes('resource')) return 'resources';
    if (flat.includes('founder') || flat.includes('team')) return 'team';
    if (flat.includes('contact')) return 'contact';
    if (flat.includes('camp')) return 'camp';
    return 'home';
  }

  const path = normalizePath(location.pathname);
  location.replace('/#' + inferRoute(path));
</script>
</head>
<body>
<p>Redirecting to <a href="/">Kritikal Discussions</a>.</p>
</body>
</html>
